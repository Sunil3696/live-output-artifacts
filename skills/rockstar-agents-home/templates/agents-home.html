<!-- Rockstar Agents home — lists every IR agent (orchestrator) the user can
     access; expand an agent to see its skills + tools; each skill has a
     "Start chat" button that opens a NEW Cowork chat for that skill.
     LIVE: re-fetches on reopen.

     Claude — before creating the artifact you MUST do ONE substitution:
     replace the TWO occurrences of the token __ROCKSTAR_AGENTS_TOOL__ (the
     `const TOOL` line below AND the `mcp_tools` array you pass to
     create_artifact) with the EXACT fully-qualified name of the rockstar_agents
     tool as it appears in THIS session's available tools — it looks like
     `mcp__<serverId>__rockstar_agents` where <serverId> is an opaque UUID.
     Do NOT use `mcp__ir-mcp__rockstar_agents` (the friendly connector name) —
     it does NOT resolve inside the Cowork artifact sandbox and the load fails.
     Otherwise copy this HTML as-is; do NOT paste any instructions into the page. -->
<style>
  /* Light theme by default (Cowork artifacts render on a white surface),
     auto-adapting to dark mode. */
  :root{
    --surface:#ffffff; --surface-2:#f7f5ff;
    --bd:#e7e3f1; --bd-h:#b9a6f5;
    --txt:#1d1b29; --muted:#5c5870; --faint:#9590a8;
    --pill-bg:#f3effe; --pill-bd:#e2d8fb; --pill-tx:#6b3fd0;
    --accent1:#7c5cff; --accent2:#5b3fd6;
    --sh:0 1px 2px rgba(20,16,40,.04), 0 4px 14px rgba(20,16,40,.05);
    --sh-h:0 8px 26px rgba(124,92,255,.16);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --surface:rgba(255,255,255,.04); --surface-2:rgba(255,255,255,.07);
      --bd:rgba(255,255,255,.10); --bd-h:rgba(140,120,240,.55);
      --txt:#ececf4; --muted:#a79fc4; --faint:#74708e;
      --pill-bg:rgba(124,92,255,.14); --pill-bd:rgba(124,92,255,.30); --pill-tx:#cbbcff;
      --sh:none; --sh-h:none;
    }
  }
  *{box-sizing:border-box}
  #rah{ font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
        color:var(--txt); max-width:1060px; margin:0 auto; padding:4px 4px 40px; }
  #rah-status{ color:var(--muted); padding:20px 4px; font-size:14px; }
  /* header */
  .rah-head{ margin:6px 2px 20px; }
  .rah-head h1{ margin:0; font-size:28px; font-weight:720; letter-spacing:-.025em; color:var(--txt); }
  .rah-head .sub{ margin:7px 0 0; color:var(--muted); font-size:14.5px; max-width:620px; }
  .rah-count{ display:inline-block; margin-top:14px; padding:6px 13px; border-radius:999px;
    background:var(--pill-bg); border:1px solid var(--pill-bd);
    color:var(--pill-tx); font-size:12px; font-weight:650; letter-spacing:.01em; }
  /* search */
  .rah-search{ position:relative; margin:18px 2px 24px; }
  .rah-search input{ width:100%; padding:13px 14px 13px 42px; border-radius:14px;
    background:var(--surface); border:1px solid var(--bd); color:var(--txt);
    font-size:14.5px; outline:none; box-shadow:var(--sh);
    transition:border-color .15s, box-shadow .15s; }
  .rah-search input::placeholder{ color:var(--faint); }
  .rah-search input:focus{ border-color:var(--bd-h); box-shadow:0 0 0 4px rgba(124,92,255,.12); }
  .rah-search svg{ position:absolute; left:14px; top:50%; transform:translateY(-50%);
    width:17px; height:17px; color:var(--faint); }
  /* agent block */
  .rah-agent{ margin-bottom:28px; }
  .rah-agent-head{ display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin:0 2px 5px; }
  .rah-agent-head h2{ margin:0; font-size:18px; font-weight:700; letter-spacing:-.01em; color:var(--txt); }
  .rah-agent-head .tag{ font-size:11px; color:var(--faint); text-transform:uppercase; letter-spacing:.12em; font-weight:600; }
  .rah-agent-desc{ margin:0 2px 16px; color:var(--muted); font-size:13.5px; max-width:780px; }
  /* labels */
  .rah-label{ margin:20px 2px 12px; font-size:11px; font-weight:700; letter-spacing:.14em;
    text-transform:uppercase; color:var(--faint); }
  /* skills grid */
  .rah-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:14px; }
  .rah-skill{ display:flex; flex-direction:column; background:var(--surface);
    border:1px solid var(--bd); border-radius:16px; padding:16px 16px 15px; box-shadow:var(--sh);
    transition:border-color .16s ease, box-shadow .16s ease, transform .16s ease; }
  .rah-skill:hover{ border-color:var(--bd-h); box-shadow:var(--sh-h); transform:translateY(-3px); }
  .rah-skill .nm{ font-size:15px; font-weight:680; color:var(--txt); margin-bottom:6px; letter-spacing:-.01em; }
  .rah-skill .ds{ font-size:12.5px; color:var(--muted); line-height:1.55; flex:1;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .rah-start{ display:inline-flex; align-items:center; gap:7px; align-self:flex-start;
    margin-top:14px; padding:8px 15px; border-radius:11px; cursor:pointer;
    font-size:12.5px; font-weight:680; color:#fff; text-decoration:none;
    background:linear-gradient(180deg,var(--accent1),var(--accent2));
    box-shadow:0 2px 8px rgba(124,92,255,.32), 0 1px 0 rgba(255,255,255,.18) inset;
    transition:filter .14s ease, transform .12s ease, box-shadow .14s ease; }
  .rah-start:hover{ filter:brightness(1.06); transform:translateY(-1px); box-shadow:0 4px 14px rgba(124,92,255,.4), 0 1px 0 rgba(255,255,255,.18) inset; }
  .rah-start:active{ transform:translateY(0); }
  .rah-start svg{ width:11px; height:11px; }
  /* tools */
  .rah-tools{ display:flex; flex-wrap:wrap; gap:9px; }
  .rah-tool{ padding:8px 13px; border-radius:11px; background:var(--surface);
    border:1px solid var(--bd); font-size:12.5px; color:var(--muted); box-shadow:var(--sh); }
  .rah-tool b{ color:var(--txt); font-weight:650; }
  .rah-empty{ color:var(--faint); font-size:13px; padding:6px 2px; }
  .rah-none{ display:none; color:var(--faint); font-size:13.5px; padding:18px 2px; }
</style>

<div id="rah-status">Loading agents&hellip;</div>
<div id="rah" style="display:none">
  <div class="rah-head">
    <h1>Rockstar Agents</h1>
    <p class="sub">Every agent you can run, with the skills and tools inside it. Pick a skill and start a new chat.</p>
    <span class="rah-count" id="rah-count"></span>
  </div>
  <div class="rah-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4-4"></path></svg>
    <input id="rah-q" type="text" placeholder="Search skills&hellip;" autocomplete="off">
  </div>
  <div id="rah-body"></div>
  <div class="rah-none" id="rah-none">No skills match your search.</div>
</div>

<script>
  // Claude replaces __ROCKSTAR_AGENTS_TOOL__ with the EXACT loaded tool name
  // (mcp__<serverId>__rockstar_agents, UUID serverId — NOT mcp__ir-mcp__...).
  const TOOL = "__ROCKSTAR_AGENTS_TOOL__";   // read-only catalog tool
  const ARGS = {};
  const PLAY = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';

  function unwrap(r){
    if(r && r.isError) throw new Error("Tool returned an error");
    if(r && r.structuredContent != null) return r.structuredContent;
    try{ return JSON.parse(r.content[0].text); }
    catch{ return r.content?.[0]?.text ?? {}; }
  }
  function esc(s){
    return String(s ?? "").replace(/[&<>"]/g, c =>
      ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
  }
  function attr(s){ return esc(s).replace(/'/g,"&#39;"); }

  function skillCard(s){
    const raw  = s.name || s.skillId || "";
    const name = esc(raw);
    const desc = s.description ? esc(s.description) : "";
    const prompt = "Hey Rockstar, run the " + raw + " skill";
    const link = "claude://cowork/new?q=" + encodeURIComponent(prompt);
    const hay  = (raw + " " + (s.description || "")).toLowerCase();
    return `<div class="rah-skill" data-s="${attr(hay)}">
      <div class="nm">${name}</div>
      <div class="ds">${desc}</div>
      <a class="rah-start" href="${attr(link)}" data-prompt="${attr(prompt)}"
         onclick="startChat(this)">${PLAY} Start chat</a>
    </div>`;
  }
  function toolChip(t){
    const name = esc(t.name || "");
    const desc = t.description ? " &middot; " + esc(t.description) : "";
    return `<div class="rah-tool"><b>${name}</b>${desc}</div>`;
  }
  function agentBlock(a){
    const skills = a.skills || [], tools = a.tools || [];
    const skillsHtml = skills.length
      ? `<div class="rah-grid">${skills.map(skillCard).join("")}</div>`
      : `<div class="rah-empty">No skills in this agent.</div>`;
    const toolsHtml = tools.length
      ? `<div class="rah-label">Tools</div><div class="rah-tools">${tools.map(toolChip).join("")}</div>`
      : "";
    return `<div class="rah-agent">
      <div class="rah-agent-head">
        <h2>${esc(a.displayName || a.name)}</h2>
        <span class="tag">${skills.length} skills &middot; ${tools.length} tools</span>
      </div>
      ${a.description ? `<p class="rah-agent-desc">${esc(a.description)}</p>` : ""}
      <div class="rah-label">Skills</div>
      ${skillsHtml}
      ${toolsHtml}
    </div>`;
  }
  function render(data){
    const agents = (data && data.agents) || [];
    const nSkills = agents.reduce((n,a)=> n + (a.skills?.length||0), 0);
    const nTools  = agents.reduce((n,a)=> n + (a.tools?.length||0), 0);
    document.getElementById("rah-count").innerHTML =
      `${agents.length} agent${agents.length===1?"":"s"} &middot; ${nSkills} skills &middot; ${nTools} tools`;
    document.getElementById("rah-body").innerHTML = agents.length
      ? agents.map(agentBlock).join("")
      : `<div class="rah-empty">No agents available yet.</div>`;
  }
  function startChat(el){
    const prompt = el.getAttribute("data-prompt") || "";
    try{ navigator.clipboard && navigator.clipboard.writeText(prompt); }catch(e){}
    // href fires and opens Claude; clipboard is the fallback if the sandbox blocks it.
  }
  function filter(q){
    q = (q||"").trim().toLowerCase();
    const cards = document.querySelectorAll(".rah-skill");
    let shown = 0;
    cards.forEach(c=>{
      const hit = !q || (c.getAttribute("data-s")||"").includes(q);
      c.style.display = hit ? "" : "none";
      if(hit) shown++;
    });
    document.querySelectorAll(".rah-agent").forEach(ag=>{
      const any = ag.querySelector('.rah-skill:not([style*="display: none"])');
      ag.style.display = (q && !any) ? "none" : "";
    });
    document.getElementById("rah-none").style.display = (q && shown===0) ? "block" : "none";
  }
  async function load(){
    const status = document.getElementById("rah-status");
    try{
      const r = await window.cowork.callMcpTool(TOOL, ARGS);
      render(unwrap(r));
      status.style.display = "none";
      document.getElementById("rah").style.display = "block";
      const q = document.getElementById("rah-q");
      q.addEventListener("input", e => filter(e.target.value));
    }catch(e){
      status.textContent = "Failed to load agents: " + e.message;
    }
  }
  load();
</script>
